let provider, signer;

async function switchToArc() {
  try { await window.ethereum.request({ method: "wallet_switchEthereumChain", params: [{ chainId: ARC_CHAIN_ID }] }); }
  catch (e) {
    await window.ethereum.request({ method: "wallet_addEthereumChain", params: [{
      chainId: ARC_CHAIN_ID, chainName: "Arc Testnet",
      nativeCurrency: { name: "USDC", symbol: "USDC", decimals: 18 },
      rpcUrls: [ARC_RPC], blockExplorerUrls: ["https://testnet.arcscan.app"]
    }] });
  }
}

document.getElementById("connectBtn").onclick = async () => {
  const el = document.getElementById("connectStatus");
  if (!window.ethereum) { el.innerHTML = '<span class="err">No MetaMask found.</span>'; return; }
  try {
    await window.ethereum.request({ method: "eth_requestAccounts" });
    await switchToArc();
    provider = new ethers.providers.Web3Provider(window.ethereum);
    signer = provider.getSigner();
    const addr = await signer.getAddress();
    el.innerHTML = `<span class="ok">Connected: ${addr}</span>`;
    document.getElementById("deployBtn").disabled = false;
    document.getElementById("addAdminBtn").disabled = false;
    document.getElementById("checkAdminBtn").disabled = false;
  } catch (e) { el.innerHTML = `<span class="err">${e.message}</span>`; }
};

document.getElementById("deployBtn").onclick = async () => {
  const out = document.getElementById("deployOut");
  const usdc = document.getElementById("usdcAddr").value.trim();
  out.innerHTML = '<span class="info">Deploying — confirm in MetaMask...</span>';
  try {
    const factory = new ethers.ContractFactory(ABI, BYTECODE, signer);
    const contract = await factory.deploy(usdc);
    out.innerHTML = `<span class="info">Tx sent: ${contract.deployTransaction.hash}\nWaiting for confirmation...</span>`;
    await contract.deployed();
    out.innerHTML = `<span class="ok">Deployed!\nAddress: ${contract.address}\nTx: ${contract.deployTransaction.hash}</span>`;
    document.getElementById("contractAddr").value = contract.address;
  } catch (e) { out.innerHTML = `<span class="err">${e.reason || e.message}</span>`; }
};

document.getElementById("addAdminBtn").onclick = async () => {
  const out = document.getElementById("adminOut");
  const contractAddr = document.getElementById("contractAddr").value.trim();
  const adminAddr = document.getElementById("adminAddr").value.trim();
  out.innerHTML = '<span class="info">Confirm in MetaMask...</span>';
  try {
    const contract = new ethers.Contract(contractAddr, ABI, signer);
    const tx = await contract.addAdmin(adminAddr);
    out.innerHTML = `<span class="info">Tx sent: ${tx.hash}\nWaiting...</span>`;
    await tx.wait();
    out.innerHTML = `<span class="ok">addAdmin confirmed!\nTx: ${tx.hash}</span>`;
  } catch (e) { out.innerHTML = `<span class="err">${e.reason || e.message}</span>`; }
};

document.getElementById("checkAdminBtn").onclick = async () => {
  const out = document.getElementById("adminOut");
  const contractAddr = document.getElementById("contractAddr").value.trim();
  const adminAddr = document.getElementById("adminAddr").value.trim();
  try {
    const contract = new ethers.Contract(contractAddr, ABI, provider);
    const [isAdmin, owner] = await Promise.all([contract.admins(adminAddr), contract.owner()]);
    out.innerHTML = `<span class="ok">isAdmin(${adminAddr}) = ${isAdmin}\nowner() = ${owner}</span>`;
  } catch (e) { out.innerHTML = `<span class="err">${e.reason || e.message}</span>`; }
};
</script>
